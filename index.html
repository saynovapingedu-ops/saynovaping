<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/saynovaping/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" content="#6F2D8E" />
    <title>นักสืบสุขภาพ: ภารกิจปกป้องลมหายใจ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Bai+Jamjuree:wght@500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // เก็บ liff.state ไว้ให้ App อ่านหลัง LIFF init เสร็จ (ห้าม replaceState ตอนนี้
      // เพราะ LIFF SDK ต้องการ auth params ใน URL เพื่อเสร็จสิ้น OAuth)
      // ส่วน SPA fallback ของ direct URL ยังทำงานเหมือนเดิม
      (function () {
        var params = new URLSearchParams(window.location.search);
        var liffState = params.get('liff.state');
        if (liffState) {
          sessionStorage.setItem('hd_liff_target', liffState);
        }
        var redirect = sessionStorage.getItem('hd_spa_redirect');
        if (redirect && redirect !== '/') {
          sessionStorage.removeItem('hd_spa_redirect');
          history.replaceState(null, '', '/saynovaping' + redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
